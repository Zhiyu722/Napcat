name: 运行 Napcat（支持交互）

on:
  workflow_dispatch:
    inputs:
      enable_tmate:
        description: '启用 tmate 交互终端（Web 方式）'
        required: true
        default: 'true'
        type: choice
        options:
          - 'false'
          - 'true'
      napcat_action:
        description: '执行操作：install（安装）, run（仅运行）'
        required: true
        default: 'install'
        type: choice
        options:
          - install
          - run

jobs:
  napcat:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ========== 关键：强制使用 Web 终端，无需 SSH 公钥 ==========
      - name: 启动 tmate 交互终端（Web）
        if: github.event.inputs.enable_tmate == 'true'
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          web: true                 # ← 这一行必须加！
          limit-access-to-actor: true

      # ---------- 安装 NapCat（可选，如果要在 tmate 中手动安装则把 if 改成 false） ----------
      - name: 安装 NapCat
        if: github.event.inputs.napcat_action == 'install'
        run: |
          curl -o napcat.sh https://nclatest.znin.net/NapNeko/NapCat-Installer/main/script/install.sh
          bash napcat.sh

      # ---------- 启动 NapCat 并保持运行 ----------
      - name: 启动 NapCat 并保持运行
        run: |
          nohup napcat > napcat.log 2>&1 &
          sleep 3
          if pgrep -f "napcat" > /dev/null; then
            echo "NapCat 已启动，日志：napcat.log"
          else
            echo "启动失败，日志内容："
            cat napcat.log
            exit 1
          fi
          tail -f napcat.log
