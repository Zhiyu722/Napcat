name: 运行 Napcat（支持交互）

on:
  workflow_dispatch:
    inputs:
      enable_tmate:
        description: '启用 tmate 交互终端（Web/SSH）'
        required: true
        default: 'true'
        type: choice
        options:
          - 'false'
          - 'true'
      napcat_action:
        description: '执行操作：install（安装）, run（仅运行）'
        required: true
        default: 'install'
        type: choice
        options:
          - install
          - run

jobs:
  napcat:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ---------- 关键修改：tmate 交互（Web 方式，无需 SSH 公钥） ----------
      - name: 启动 tmate 交互终端（Web 访问）
        if: github.event.inputs.enable_tmate == 'true'
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          # 强制启用 Web 终端，不依赖 SSH 公钥
          web: true
          # 仅限触发工作流的人访问（增强安全性）
          limit-access-to-actor: true

      # ---------- 安装 NapCat ----------
      - name: 安装 NapCat
        if: github.event.inputs.napcat_action == 'install'
        run: |
          curl -o napcat.sh https://nclatest.znin.net/NapNeko/NapCat-Installer/main/script/install.sh
          bash napcat.sh
        # 如果你希望在 tmate 会话中手动安装，可以将本步骤禁用（将 if 改为 false）

      # ---------- 启动 NapCat ----------
      - name: 启动 NapCat 并保持运行
        run: |
          nohup napcat > napcat.log 2>&1 &
          sleep 3
          if pgrep -f "napcat" > /dev/null; then
            echo "NapCat 已启动，日志：napcat.log"
          else
            echo "启动失败，日志内容："
            cat napcat.log
            exit 1
          fi
          tail -f napcat.log
